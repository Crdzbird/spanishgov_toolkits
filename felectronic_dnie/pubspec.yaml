name: felectronic_dnie
description: >-
  Flutter plugin for reading and signing with Spanish electronic DNIe
  (Documento Nacional de Identidad electronico) via NFC.
version: 1.0.0
repository: https://github.com/nicoacevedor/felectronic_dnie
issue_tracker: https://github.com/nicoacevedor/felectronic_dnie/issues
topics:
  - nfc
  - dnie
  - spain
  - signing
  - identity

environment:
  flutter: ">=3.22.0"
  sdk: ^3.11.0

flutter:
  plugin:
    platforms:
      android:
        default_package: felectronic_dnie_android
      ios:
        default_package: felectronic_dnie_ios

dependencies:
  felectronic_dnie_android: ^1.0.0
  felectronic_dnie_ios: ^1.0.0
  felectronic_dnie_platform_interface: ^1.0.0
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  plugin_platform_interface: ^2.1.8
  very_good_analysis: ^10.2.0
