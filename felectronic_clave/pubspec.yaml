name: felectronic_clave
description: >-
  Cl@ve authentication for Spanish government services. Supports Cl@ve PIN,
  Cl@ve Permanente, Electronic Certificate, European Credential (eIDAS), and
  Cl@ve Movil flows.
version: 1.0.0
repository: https://github.com/nicoacevedor/felectronic_dnie
issue_tracker: https://github.com/nicoacevedor/felectronic_dnie/issues
topics:
  - oauth
  - clave
  - spain
  - authentication
  - identity

environment:
  sdk: ^3.4.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_appauth: ^12.0.0
  flutter_secure_storage: ^10.0.0
  http: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  very_good_analysis: ^10.2.0
