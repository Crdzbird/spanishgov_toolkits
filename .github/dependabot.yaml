version: 2
enable-beta-ecosystems: true
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
  - package-ecosystem: "pub"
    directory: "/felectronic_dnie"
    schedule:
      interval: "daily"
  - package-ecosystem: "pub"
    directory: "/felectronic_dnie/example"
    schedule:
      interval: "daily"
  - package-ecosystem: "pub"
    directory: "/felectronic_dnie_platform_interface"
    schedule:
      interval: "daily"
  - package-ecosystem: "pub"
    directory: "/felectronic_dnie_android"
    schedule:
      interval: "daily"
  - package-ecosystem: "pub"
    directory: "/felectronic_dnie_ios"
    schedule:
      interval: "daily"