name: felectronic_dnie_android
description: >-
  Android implementation of the felectronic_dnie plugin for DNIe
  NFC operations including signing and certificate reading.
version: 1.0.0
repository: https://github.com/nicoacevedor/felectronic_dnie
issue_tracker: https://github.com/nicoacevedor/felectronic_dnie/issues
topics:
  - nfc
  - dnie
  - android

environment:
  flutter: ">=3.22.0"
  sdk: ^3.11.0

flutter:
  plugin:
    implements: felectronic_dnie
    platforms:
      android:
        package: es.gob.electronic_dnie
        pluginClass: ElectronicDniePlugin
        dartPluginClass: FelectronicDnieAndroid

dependencies:
  felectronic_dnie_platform_interface: ^1.0.0
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  plugin_platform_interface: ^2.1.8
  very_good_analysis: ^10.2.0
